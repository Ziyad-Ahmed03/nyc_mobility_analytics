version: '3.8'

# ============================================================
# NYC Mobility Analytics — Fixed Docker Compose
# ============================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR:                    LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:        postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY:                  '46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0jKKjY='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES:               'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG:          'true'
    AIRFLOW__WEBSERVER__SECRET_KEY:             'nyc_mobility_secret_2025'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK:    'true'
    # Spark config
    SPARK_HOME:    /opt/spark
    JAVA_HOME:     /usr/lib/jvm/java-17-openjdk-amd64
    PATH:          /opt/spark/bin:/opt/spark/sbin:/home/airflow/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    # NYC data paths
    NYC_DATA_DIR:  /opt/airflow/data
    NYC_PG_HOST:   postgres
    NYC_PG_PORT:   5432
    NYC_PG_DB:     nyc_mobility
    NYC_PG_USER:   nyc_user
    NYC_PG_PASS:   nyc_pass_2025
    PYTHONPATH:    /opt/airflow/spark_jobs
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./spark_jobs:/opt/airflow/spark_jobs
    - ./data:/opt/airflow/data
    - ./config:/opt/airflow/config
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - nyc_net

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: nyc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init_db.sh:/docker-entrypoint-initdb.d/00_init.sh
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 30s
    networks:
      - nyc_net

  # ── Airflow Init ───────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: nyc_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@nyc.io \
          --password admin || true
        airflow connections add nyc_postgres \
          --conn-type postgres \
          --conn-host postgres \
          --conn-login nyc_user \
          --conn-password nyc_pass_2025 \
          --conn-schema nyc_mobility \
          --conn-port 5432 || true
        echo "Airflow initialized ✓"
    restart: on-failure
    networks:
      - nyc_net

  # ── Airflow Scheduler ──────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: nyc_airflow_scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - nyc_net

  # ── Airflow Webserver ──────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: nyc_airflow_webserver
    command: webserver
    ports:
      - "8081:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - nyc_net

  # ── Apache Spark Master ────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.1
    container_name: nyc_spark_master
    restart: unless-stopped
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --ip 0.0.0.0 --port 7077 --webui-port 8090
    volumes:
      - ./data:/opt/airflow/data
      - ./spark_jobs:/opt/airflow/spark_jobs
    ports:
      - "8090:8090"
      - "7077:7077"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nyc_net

  # ── Apache Spark Worker ────────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.1
    container_name: nyc_spark_worker
    restart: unless-stopped
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --webui-port 8091 --memory 4g --cores 4
    volumes:
      - ./data:/opt/airflow/data
      - ./spark_jobs:/opt/airflow/spark_jobs
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - nyc_net

  # ── Streamlit Dashboard ────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: nyc_dashboard
    ports:
      - "8501:8501"
    environment:
      NYC_PG_HOST:  postgres
      NYC_PG_PORT:  5432
      NYC_PG_DB:    nyc_mobility
      NYC_PG_USER:  nyc_user
      NYC_PG_PASS:  nyc_pass_2025
      NYC_DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
      - ./dashboard:/app/dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nyc_net

networks:
  nyc_net:
    driver: bridge
    name: nyc_mobility_network

volumes:
  postgres_data:
    driver: local
